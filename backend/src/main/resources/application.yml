server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: harness-engineering-intelligent-assistant
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/harness_agent?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:harness}
    password: ${DB_PASSWORD:harness}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  mvc:
    problemdetails:
      enabled: true
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:qwen2.5:3b}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
    prometheus:
      enabled: true
  info:
    env:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

info:
  app:
    name: Harness Engineering Intelligent Assistant
    phase: PHASE_9
    description: Investment research assistant with governed agents, sandbox execution, and skill approval.
    compliance: Educational analysis and risk reminders only.

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:5173}
    jwt-secret: ${JWT_SECRET:dev-only-change-me-please-32-bytes-minimum}
    token-ttl-minutes: ${JWT_TTL_MINUTES:120}
  compliance:
    default-disclaimer: "This system provides educational explanations, auxiliary analysis, and risk reminders only. It does not promise returns and does not replace advice from a licensed financial advisor."
    required-warnings:
      - "Investment involves risk, including possible loss of principal."
      - "Historical performance does not guarantee future results."
      - "Forecasts must disclose assumptions, data sources, confidence, and risk."
      - "Personalized suggestions require risk preference, investment horizon, and capital purpose."
  market-data:
    mock-enabled: true
    external-enabled: false
    mock-provider-name: local-mock-market-data
    external-provider-name: external-adapter-placeholder
  ai:
    test-mode: ${AI_TEST_MODE:false}
    mock-responses-enabled: ${AI_MOCK_RESPONSES:false}
    paid-access-enabled: ${AI_PAID_ACCESS_ENABLED:false}
    default-model-id: ${AI_DEFAULT_MODEL_ID:ollama-qwen2.5-3b}
    response-language: ${AI_RESPONSE_LANGUAGE:zh-CN}
    ollama:
      enabled: ${OLLAMA_ENABLED:true}
      model-id: ollama-qwen2.5-3b
      display-name: "Local Ollama Qwen2.5 3B"
      model: ${OLLAMA_MODEL:qwen2.5:3b}
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      currency: USD
      prompt-price-per-million-tokens: 0.000000
      completion-price-per-million-tokens: 0.000000
    minimax:
      enabled: ${MINIMAX_ENABLED:true}
      model-id: minimax-chat
      display-name: "MiniMax paid model"
      model: ${MINIMAX_MODEL:MiniMax-Text-01}
      base-url: ${MINIMAX_BASE_URL:https://api.minimax.chat/v1/chat/completions}
      api-key: ${MINIMAX_API_KEY:}
      currency: USD
      prompt-price-per-million-tokens: ${MINIMAX_PROMPT_PRICE_PER_MILLION_TOKENS:0.000000}
      completion-price-per-million-tokens: ${MINIMAX_COMPLETION_PRICE_PER_MILLION_TOKENS:0.000000}
