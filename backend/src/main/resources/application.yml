server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: harness-engineering-intelligent-assistant
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/harness_agent?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:harness}
    password: ${DB_PASSWORD:harness}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  mvc:
    problemdetails:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:5173}
    jwt-secret: ${JWT_SECRET:dev-only-change-me-please-32-bytes-minimum}
    token-ttl-minutes: ${JWT_TTL_MINUTES:120}
  compliance:
    default-disclaimer: "This system provides educational explanations, auxiliary analysis, and risk reminders only. It does not promise returns and does not replace advice from a licensed financial advisor."
    required-warnings:
      - "Investment involves risk, including possible loss of principal."
      - "Historical performance does not guarantee future results."
      - "Forecasts must disclose assumptions, data sources, confidence, and risk."
      - "Personalized suggestions require risk preference, investment horizon, and capital purpose."
