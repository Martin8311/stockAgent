spring:
  datasource:
    url: jdbc:h2:mem:harness_agent;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

app:
  security:
    allowed-origins:
      - http://localhost:5173
    jwt-secret: test-only-change-me-please-32-bytes-minimum
    token-ttl-minutes: 60
  compliance:
    default-disclaimer: "Test disclaimer for investment education only."
    required-warnings:
      - "Investment involves risk."
      - "Historical performance does not guarantee future results."
